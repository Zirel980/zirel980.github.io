<!DOCTYPE html>
<html>
<head>
    <title>SSLG Reporting Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <img src="sslg-logo.png" alt="SSLG Logo" class="logo" width="80px" height="80px">
    <header>
        <h1>SSLG Reporting Portal</h1>
        <p>Submit concerns, suggestions, and reports.</p>
    </header>

    <main>
        <form action="https://formspree.io/f/xjgdvqao" method="POST">

            <label>Name (Optional)</label>
            <input type="text" name="name">

            <label>Grade & Section</label>
            <input type="text" name="section">

            <label>Concern Type</label>
            <select name="type">
                <option>Suggestion</option>
                <option>Bullying</option>
                <option>Facilities</option>
                <option>Academic</option>
                <option>Other</option>
            </select>

            <label>Description</label>
            <textarea name="message" required></textarea>

            <button type="submit">Submit Report</button>

            <input
              type="hidden"
              name="_redirect"
              value="https://zirel980.github.io/thankyou.html">

        </form>
    </main>

</body>
</html>
